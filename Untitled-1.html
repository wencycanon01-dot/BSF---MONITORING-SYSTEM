<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEURAL-ARCH INTERFACE</title>
    <style>
        :root {
            --neon: #00f2ff;
            --deep: #050505;
            --glass: rgba(15, 15, 25, 0.7);
            --accent: #7000ff;
            --font-main: 'Inter', system-ui, -apple-system, sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: none; }

        body {
            background: #000;
            color: #fff;
            font-family: var(--font-main);
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            perspective: 2000px;
        }

        /* Expert Background: Animated Grid Mesh */
        .grid-mesh {
            position: fixed;
            inset: -100%;
            background-image: 
                linear-gradient(rgba(0, 242, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 242, 255, 0.05) 1px, transparent 1px);
            background-size: 50px 50px;
            transform: rotateX(60deg);
            animation: mesh-move 20s linear infinite;
            z-index: -1;
        }

        @keyframes mesh-move {
            0% { transform: rotateX(60deg) translateY(0); }
            100% { transform: rotateX(60deg) translateY(50px); }
        }

        /* The "Impossible" Floating Console */
        .console-wrap {
            position: relative;
            width: 900px;
            height: 550px;
            transform-style: preserve-3d;
            transition: transform 0.1s ease-out;
        }

        .main-frame {
            position: absolute;
            inset: 0;
            background: var(--glass);
            backdrop-filter: blur(40px) saturate(180%);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 40px;
            display: grid;
            grid-template-columns: 250px 1fr;
            gap: 30px;
            box-shadow: 0 0 100px rgba(0,0,0,0.8), inset 0 0 20px rgba(0,242,255,0.1);
            overflow: hidden;
        }

        /* Pseudo-Ray Tracing Reflection */
        .main-frame::after {
            content: '';
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.03), transparent);
            transform: rotate(-45deg);
            pointer-events: none;
        }

        /* Sidebar Navigation with Hover Logic */
        .sidebar {
            display: flex;
            flex-direction: column;
            gap: 15px;
            z-index: 2;
        }

        .nav-item {
            padding: 15px;
            background: rgba(255,255,255,0.03);
            border-left: 3px solid transparent;
            font-size: 0.7rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .nav-item:hover {
            background: rgba(0, 242, 255, 0.1);
            border-left-color: var(--neon);
            transform: translateX(10px) translateZ(30px);
            color: var(--neon);
        }

        /* Procedural Data Visualization */
        .content-area {
            position: relative;
            border-left: 1px solid rgba(255,255,255,0.05);
            padding-left: 30px;
        }

        .header-logic {
            margin-bottom: 30px;
        }

        .title-glitch {
            font-size: 3rem;
            font-weight: 900;
            background: linear-gradient(90deg, #fff, var(--neon));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            position: relative;
        }

        .data-stream {
            height: 200px;
            font-family: 'Courier New', monospace;
            font-size: 11px;
            color: var(--neon);
            opacity: 0.6;
            overflow: hidden;
            mask-image: linear-gradient(to bottom, transparent, #000, transparent);
        }

        /* Floating 3D HUD Elements */
        .hud-element {
            position: absolute;
            background: rgba(112, 0, 255, 0.2);
            border: 1px solid var(--accent);
            padding: 10px;
            border-radius: 5px;
            font-size: 10px;
            pointer-events: none;
            transform: translateZ(100px);
            animation: float 4s infinite ease-in-out;
        }

        /* Custom Cursor */
        #cursor {
            width: 20px;
            height: 20px;
            border: 1px solid var(--neon);
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            transition: transform 0.1s;
        }

        @keyframes float {
            0%, 100% { transform: translateZ(100px) translateY(0); }
            50% { transform: translateZ(150px) translateY(-20px); }
        }

    </style>
</head>
<body>

    <div id="cursor"></div>
    <div class="grid-mesh"></div>

    <div class="console-wrap" id="scene">
        <div class="hud-element" style="top: -20px; right: -50px;">STATUS: OPTIMAL</div>
        <div class="hud-element" style="bottom: 50px; left: -80px; border-color: var(--neon);">LINK: ENCRYPTED</div>

        <div class="main-frame">
            <aside class="sidebar">
                <div style="font-size: 1.5rem; margin-bottom: 20px; color: var(--neon);">Ω</div>
                <div class="nav-item">Core Modules</div>
                <div class="nav-item">Neural Mapping</div>
                <div class="nav-item">Quantum Logic</div>
                <div class="nav-item">Encryption</div>
                <div class="nav-item">System Sync</div>
            </aside>

            <main class="content-area">
                <div class="header-logic">
                    <p style="font-size: 10px; color: var(--accent); margin-bottom: 5px;">ARCHITECTURE V.4.0.2</p>
                    <h1 class="title-glitch">SYNTHETIC</h1>
                </div>

                <div class="data-stream" id="logger">
                    </div>

                <div style="margin-top: 40px; display: flex; gap: 20px;">
                    <div style="width: 100px; height: 100px; border: 2px solid var(--neon); border-radius: 50%; display: flex; justify-content: center; align-items: center; animation: spin 10s linear infinite;">
                        <div style="width: 70%; height: 2px; background: var(--neon);"></div>
                    </div>
                    <div>
                        <p style="font-size: 12px; margin-bottom: 10px;">PROCESSING POWER</p>
                        <div style="width: 250px; height: 4px; background: rgba(255,255,255,0.1);">
                            <div style="width: 75%; height: 100%; background: var(--neon); box-shadow: 0 0 15px var(--neon);"></div>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script>
        const scene = document.getElementById('scene');
        const logger = document.getElementById('logger');
        const cursor = document.getElementById('cursor');

        // Expert Mouse Interaction (3D Parallax)
        document.addEventListener('mousemove', (e) => {
            // Cursor movement
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
            
            // 3D Tilt calculation
            const x = (window.innerWidth / 2 - e.clientX) / 30;
            const y = (window.innerHeight / 2 - e.clientY) / 30;
            
            scene.style.transform = `rotateY(${-x}deg) rotateX(${y}deg)`;
        });

        // Procedural Log Generator
        const hex = "0123456789ABCDEF";
        setInterval(() => {
            const div = document.createElement('div');
            let code = "";
            for(let i=0; i<30; i++) code += hex.charAt(Math.floor(Math.random() * 16));
            div.textContent = `> EXEC_PATH_${code}_STABLE_LINK`;
            logger.prepend(div);
            if(logger.childNodes.length > 15) logger.removeChild(logger.lastChild);
        }, 150);

        // Click effect
        document.addEventListener('mousedown', () => {
            cursor.style.transform = 'scale(0.5)';
            scene.style.transition = 'transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275)';
        });
        document.addEventListener('mouseup', () => {
            cursor.style.transform = 'scale(1)';
        });
    </script>
</body>
</html>
