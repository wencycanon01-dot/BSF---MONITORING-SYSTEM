<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BSF Smart Monitoring - Thesis</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<style>
:root{
  --bg: #010409;
  --card: rgba(13, 20, 38, 0.7);
  --muted: #8b949e;
  --green: #00ff88;
  --red: #ff3366;
  --blue: #00d2ff;
  --border: rgba(255, 255, 255, 0.1);
}

*{box-sizing:border-box; cursor: default;}
button{cursor: pointer !important;}

body{
  margin:0; font-family: 'Inter', 'Segoe UI', sans-serif;
  background-color: var(--bg);
  background-image: radial-gradient(circle at 50% 50%, #0d1117 0%, #010409 100%);
  color: #e6edf3; min-height: 100vh;
}

.header{
  display: flex; justify-content: space-between; align-items: center;
  padding: 18px 30px; background: rgba(1, 4, 9, 0.9); backdrop-filter: blur(15px);
  border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100;
}

.header h1{ font-size: 18px; margin: 0; letter-spacing: 2px; font-weight: 900; color: #fff; text-transform: uppercase; }

#status{
  font-size: 10px; padding: 6px 15px; border-radius: 20px; font-weight: 800;
  border: 1px solid currentColor; letter-spacing: 1px;
}

.container{ padding: 25px; max-width: 1300px; margin: 0 auto; }

.grid{ display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 20px; }

.card{
  background: var(--card); border: 1px solid var(--border);
  border-radius: 20px; padding: 25px; 
  box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
}

.title{ font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 2px; font-weight: 700; margin-bottom: 10px;}
.value{ font-size: 40px; font-weight: 800; color: #fff; }

.row{ display: flex; gap: 15px; flex-wrap: wrap; margin-top: 25px; }

.btn{
  flex: 1; min-width: 150px; border: 1px solid var(--border);
  border-radius: 15px; padding: 18px; font-weight: 700; 
  transition: all 0.3s ease; color: rgba(255,255,255,0.4);
  text-transform: uppercase; font-size: 11px; letter-spacing: 1px;
  background: rgba(255, 255, 255, 0.02);
}

.btn.active-on{ background: rgba(0, 255, 136, 0.1); border-color: var(--green); color: var(--green); box-shadow: 0 0 20px rgba(0, 255, 136, 0.1); }
.btn.active-auto{ background: rgba(0, 210, 255, 0.1); border-color: var(--blue); color: var(--blue); box-shadow: 0 0 20px rgba(0, 210, 255, 0.1); }

.chart-container{ background: var(--card); border-radius: 24px; padding: 30px; margin-top: 25px; border: 1px solid var(--border); }
.log-box{ background: rgba(0,0,0,0.5); border-radius: 15px; height: 220px; overflow-y: auto; padding: 20px; font-size: 11px; border: 1px solid var(--border); line-height: 1.8; font-family: 'Consolas', monospace; }

.calendar-card{ background: var(--card); border-radius: 20px; padding: 25px; border: 1px solid var(--border); }
.cal-header{ display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
.cal-grid{ display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; text-align: center; }
.day-name{ font-size: 10px; font-weight: 800; color: var(--muted); text-transform: uppercase; }
.day{ padding: 10px; font-size: 13px; border-radius: 8px; background: rgba(255,255,255,0.02); }
.today{ background: var(--blue) !important; color: #000 !important; font-weight: 800; }

.camera-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 20px; margin-top: 25px; }
.cam-card img{ width: 100%; border-radius: 15px; border: 1px solid var(--border); background: #000; height: 220px; object-fit: cover; margin-top: 15px; }

.badge{ font-size: 9px; border-radius: 5px; padding: 5px 10px; margin-top: 12px; font-weight: 900; display: inline-block; transition: all 0.5s; }
.b-init{ background: rgba(139, 148, 158, 0.1); color: var(--muted); }
.b-ok{ background: rgba(0, 255, 136, 0.1); color: var(--green); border: 1px solid rgba(0, 255, 136, 0.2); }
.b-warn{ background: rgba(255, 51, 102, 0.1); color: var(--red); border: 1px solid rgba(255, 51, 102, 0.2); }
</style>
</head>

<body>

<div class="header">
  <h1>🐛 BSF MONITORING <span style="color: var(--blue)">SYSTEM</span></h1>
  <div id="status" style="color: var(--muted)">CONNECTING...</div>
</div>

<div class="container">
  <div class="grid">
    <div class="card">
      <div class="title">Temperature</div>
      <div id="temp" class="value">--</div>
      <div id="tempBadge" class="badge b-init">INITIALIZING</div>
    </div>
    <div class="card">
      <div class="title">Humidity</div>
      <div id="humidity" class="value">--</div>
      <div id="humBadge" class="badge b-init">INITIALIZING</div>
    </div>
    <div class="card">
      <div class="title">Light Level</div>
      <div id="light" class="value">--</div>
      <div id="lightBadge" class="badge b-init">INITIALIZING</div>
    </div>
    <div class="card" style="border-right: 4px solid var(--blue)">
      <div class="title">Current Mode</div>
      <div id="mode" class="value" style="color: var(--blue); font-size: 30px;">WAIT...</div>
    </div>
  </div>

  <div class="row">
    <button id="heaterBtn" class="btn" onclick="sendCtrl('heater')">🔥 Heater OFF</button>
    <button id="fanBtn" class="btn" onclick="sendCtrl('fan')">🌀 Fan OFF</button>
    <button id="lightBtn" class="btn" onclick="sendCtrl('light')">💡 Light OFF</button>
    <button id="humidifierBtn" class="btn" onclick="sendCtrl('humidifier')">💧 Humidifier OFF</button>
    <button id="autoBtn" class="btn" onclick="sendCtrl('auto')">🤖 Auto Mode</button>
  </div>

  <div class="chart-container">
    <div class="title" style="margin-bottom:20px; color: #fff;">Environment Statistics (24h Trend)</div>
    <div style="height: 350px;"><canvas id="bsfChart"></canvas></div>
  </div>

  <div class="camera-grid">
    <div class="card cam-card"><div class="title">Cage 01</div><img id="c1" src="" alt="Camera Offline"></div>
    <div class="card cam-card"><div class="title">Cage 02</div><img id="c2" src="" alt="Camera Offline"></div>
    <div class="card cam-card"><div class="title">Cage 03</div><img id="c3" src="" alt="Camera Offline"></div>
  </div>

  <div class="grid" style="margin-top: 25px; grid-template-columns: 1fr 1.5fr;">
    <div class="calendar-card">
        <div class="cal-header">
            <button onclick="changeMonth(-1)" style="background:none; border:none; color:#fff;">◀</button>
            <div id="calMonth" style="font-weight: 800; font-size: 14px;"></div>
            <button onclick="changeMonth(1)" style="background:none; border:none; color:#fff;">▶</button>
        </div>
        <div class="cal-grid" id="calDays"></div>
    </div>
    <div class="card">
        <div class="title">📋 System Activity Logs</div>
        <div id="log" class="log-box"></div>
    </div>
  </div>
</div>

<script>
// 2. FIREBASE INITIALIZATION
const firebaseConfig = {
    databaseURL: "https://bsf-dashboard-506ac-default-rtdb.firebaseio.com/"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let firstDataReceived = false;

// CHART SETUP
const ctx = document.getElementById('bsfChart').getContext('2d');
const bsfChart = new Chart(ctx, {
    type: 'line',
    data: {
        labels: [],
        datasets: [
            { label: 'Temp (°C)', borderColor: '#ff3366', backgroundColor: 'rgba(255, 51, 102, 0.1)', data: [], tension: 0.4, fill: true },
            { label: 'Hum (%)', borderColor: '#00ff88', backgroundColor: 'rgba(0, 255, 136, 0.1)', data: [], tension: 0.4, fill: true }
        ]
    },
    options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { display: true, labels: { color: '#8b949e', font: { weight: 'bold' } } } },
        scales: {
            x: { grid: { display: false }, ticks: { color: '#8b949e' } },
            y: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#8b949e' } }
        }
    }
});

// 3. LISTEN TO FIREBASE REAL-TIME
db.ref("sensorData").on("value", (snapshot) => {
    const d = snapshot.val();
    if (!d) return;

    if (!firstDataReceived) {
        firstDataReceived = true;
        addLog("Cloud Connection Established", "SUCCESS");
        document.getElementById('status').innerText = "ONLINE";
        document.getElementById('status').style.color = "var(--green)";
    }

    // Update Values
    document.getElementById('temp').innerText = (d.temperature || 0).toFixed(1) + "°C";
    document.getElementById('humidity').innerText = (d.humidity || 0).toFixed(1) + "%";
    document.getElementById('light').innerText = (d.light || 0).toFixed(0) + " lx";
    document.getElementById('mode').innerText = d.autoMode === 1 ? "AUTO" : "MANUAL";

    // Update Badges
    updateBadge('tempBadge', d.temperature, 25, 35);
    updateBadge('humBadge', d.humidity, 60, 85);
    document.getElementById('lightBadge').className = "badge b-ok";
    document.getElementById('lightBadge').innerText = "ACTIVE";

    // Update Buttons UI
    updateUI('heaterBtn', d.heaterStatus, '🔥 Heater');
    updateUI('fanBtn', d.fanStatus, '🌀 Fan');
    updateUI('lightBtn', d.lightStatus, '💡 Light');
    updateUI('humidifierBtn', d.humStatus, '💧 Humidifier');
    updateUI('autoBtn', d.autoMode, '🤖 Auto');

    // Update Chart
    const now = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
    if(bsfChart.data.labels.length > 12) { 
        bsfChart.data.labels.shift(); 
        bsfChart.data.datasets.forEach(s => s.data.shift()); 
    }
    bsfChart.data.labels.push(now);
    bsfChart.data.datasets[0].data.push(d.temperature);
    bsfChart.data.datasets[1].data.push(d.humidity);
    bsfChart.update('none');
});

function updateBadge(id, val, min, max) {
    const el = document.getElementById(id);
    if (val >= min && val <= max) {
        el.className = "badge b-ok";
        el.innerText = "OPTIMAL";
    } else {
        el.className = "badge b-warn";
        el.innerText = val < min ? "TOO LOW" : "TOO HIGH";
    }
}

function updateUI(id, state, label) {
    const el = document.getElementById(id);
    if (state === 1) {
        el.className = (id === 'autoBtn') ? 'btn active-auto' : 'btn active-on';
        el.innerText = label + " ON";
    } else {
        el.className = 'btn';
        el.innerText = label + " OFF";
    }
}

// 4. SEND CONTROLS TO FIREBASE
function sendCtrl(dev) {
    const btn = document.getElementById(dev + 'Btn');
    const newState = (btn.classList.contains('active-on') || btn.classList.contains('active-auto')) ? 0 : 1;
    
    // Sinesend natin ang command sa Firebase, babasahin ito ng ESP32
    db.ref("commands").update({
        [dev]: newState,
        timestamp: Date.now()
    }).then(() => {
        addLog(`USER_ACTION: Set ${dev.toUpperCase()} to ${newState ? 'ON' : 'OFF'}`, "COMMAND");
    }).catch((e) => {
        addLog(`ERR: Failed to send Cloud Command`, "ERROR");
    });
}

function addLog(m, type) {
    const l = document.getElementById('log');
    let color = "#8b949e";
    if(type === "SUCCESS") color = "var(--green)";
    if(type === "COMMAND") color = "var(--blue)";
    if(type === "ERROR") color = "var(--red)";

    const time = new Date().toLocaleTimeString([], {hour12: false});
    l.innerHTML += `<div style="margin-bottom: 4px;">
        <span style="color: #444;">[${time}]</span> 
        <span style="color: ${color}; font-weight: bold;">${m}</span>
    </div>`;
    l.scrollTop = l.scrollHeight;
}

let curDate = new Date();
function drawCal() {
    const days = document.getElementById('calDays'); days.innerHTML = '';
    const mLabel = document.getElementById('calMonth');
    mLabel.innerText = curDate.toLocaleString('default', { month: 'long', year: 'numeric' }).toUpperCase();
    ['S','M','T','W','T','F','S'].forEach(d => days.innerHTML += `<div class="day-name">${d}</div>`);
    const fDay = new Date(curDate.getFullYear(), curDate.getMonth(), 1).getDay();
    const tDays = new Date(curDate.getFullYear(), curDate.getMonth() + 1, 0).getDate();
    for(let i=0; i<fDay; i++) days.innerHTML += '<div></div>';
    for(let d=1; d<=tDays; d++) {
        let isToday = d === new Date().getDate() && curDate.getMonth() === new Date().getMonth() && curDate.getFullYear() === new Date().getFullYear() ? 'today' : '';
        days.innerHTML += `<div class="day ${isToday}">${d}</div>`;
    }
}
function changeMonth(v) { curDate.setMonth(curDate.getMonth() + v); drawCal(); }

addLog("Dashboard UI Loaded. Listening to Cloud Data...", "SUCCESS");
drawCal();

// Note: Ang camera stream ay gagana lang kung ang phone/laptop mo ay nasa parehong WiFi ng Camera (Local)
document.getElementById('c1').src = "http://192.168.11.114:81/stream";
document.getElementById('c2').src = "http://192.168.11.115:81/stream";
document.getElementById('c3').src = "http://192.168.11.116:81/stream";
</script>
</body>
</html>
