<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BSF Smart Monitoring - Wency Canon</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<style>
/* PROFESSIONAL COLOR PALETTE & VARIABLES */
:root {
  --bg-main: #0f172a;        /* Deep Slate Blue - Background */
  --bg-card: #1e293b;        /* Slightly Lighter Slate - Cards */
  --bg-header: #0f172a;      /* Same as background for blend */
  --text-main: #f1f5f9;      /* Off-White - Main Text */
  --text-muted: #94a3b8;     /* Gray-Blue - Labels/Muted */
  
  --accent-green: #10b981;   /* Emerald Green - Success/Optimal */
  --accent-red: #ef4444;     /* Red - Errors/Offline */
  --accent-blue: #3b82f6;    /* Bright Blue - System Mode/Commands */
  --accent-purple: #8b5cf6;  /* Purple - AI Prediction */
  
  --border-color: rgba(148, 163, 184, 0.1); /* Subtle border */
  --card-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3), 0 4px 6px -2px rgba(0, 0, 0, 0.2);
}

* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: 'Poppins', 'Inter', sans-serif; /* Modern professional fonts */
  background-color: var(--bg-main);
  color: var(--text-main);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* HEADER ENHANCEMENTS */
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 20px 40px;
  background-color: rgba(15, 23, 42, 0.95); /* Professional opaque background */
  backdrop-filter: blur(10px);
  border-bottom: 1px solid var(--border-color);
  position: sticky;
  top: 0;
  z-index: 100;
}

.header h1 {
  font-size: 20px;
  font-weight: 700;
  margin: 0;
  letter-spacing: -0.5px;
}

#status {
  font-size: 11px;
  padding: 8px 18px;
  border-radius: 6px; /* Slightly squarer, modern corner */
  font-weight: 700;
  border: 1px solid currentColor;
  text-transform: uppercase;
  letter-spacing: 1px;
  transition: all 0.3s ease;
}

/* CONTAINER & GRID */
.container {
  padding: 40px;
  max-width: 1400px;
  margin: 0 auto;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  gap: 25px;
}

/* PROFESSIONAL CARD DESIGN */
.card {
  background-color: var(--bg-card);
  border: 1px solid var(--border-color);
  border-radius: 12px; /* Smooth professional radius */
  padding: 30px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  box-shadow: var(--card-shadow);
  transition: transform 0.2s ease, box-shadow 0.2s ease;
}

.card:hover {
  transform: translateY(-2px);
  box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.4), 0 10px 10px -5px rgba(0, 0, 0, 0.3);
}

.title {
  font-size: 13px; /* Smaller, subtler label */
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 1.5px;
  font-weight: 600;
}

.value {
  font-size: 48px; /* Bigger, bolder numbers */
  font-weight: 800;
  color: #fff;
  margin-top: 15px;
  letter-spacing: -1px;
}

/* BUTTONS / CONTROL ROW */
.row {
  display: flex;
  gap: 15px;
  flex-wrap: wrap;
  margin-top: 30px;
}

.btn {
  flex: 1;
  min-width: 160px;
  border: 1px solid rgba(148, 163, 184, 0.2);
  border-radius: 8px;
  padding: 20px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s ease;
  color: var(--text-muted);
  text-transform: uppercase;
  font-size: 11px;
  letter-spacing: 1px;
  background-color: rgba(255, 255, 255, 0.03);
  text-align: center;
}

.btn:hover {
  background-color: rgba(255, 255, 255, 0.08);
  color: #fff;
  border-color: rgba(148, 163, 184, 0.4);
}

.btn:active { transform: scale(0.97); }

.btn.active-on {
  background-color: rgba(16, 185, 129, 0.1);
  border-color: var(--accent-green);
  color: var(--accent-green);
  box-shadow: 0 0 15px rgba(16, 185, 129, 0.2);
}

.btn.active-auto {
  background-color: rgba(59, 130, 246, 0.1);
  border-color: var(--accent-blue);
  color: var(--accent-blue);
  box-shadow: 0 0 15px rgba(59, 130, 246, 0.2);
}

/* CHART CONTAINER */
.chart-container {
  background-color: var(--bg-card);
  border-radius: 12px;
  padding: 35px;
  margin-top: 30px;
  border: 1px solid var(--border-color);
  box-shadow: var(--card-shadow);
}

/* ACTIVITY LOG BOX */
.log-box {
  background-color: rgba(0, 0, 0, 0.2);
  border-radius: 8px;
  height: 250px;
  overflow-y: auto;
  padding: 25px;
  font-size: 12px;
  border: 1px solid var(--border-color);
  font-family: 'JetBrains Mono', 'Fira Code', monospace; /* Professional mono font */
  line-height: 1.7;
  color: var(--text-muted);
}

/* CALENDAR CARD */
.calendar-card {
  background-color: var(--bg-card);
  border-radius: 12px;
  padding: 30px;
  border: 1px solid var(--border-color);
  box-shadow: var(--card-shadow);
}

.cal-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 25px;
}

.cal-header button {
  background: none;
  border: 1px solid rgba(148, 163, 184, 0.3);
  color: #fff;
  cursor: pointer;
  padding: 5px 12px;
  border-radius: 4px;
}

.cal-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 12px;
  text-align: center;
}

.day-name { font-size: 11px; font-weight: 700; color: var(--accent-blue); text-transform: uppercase; }
.day { padding: 12px; font-size: 14px; border-radius: 6px; background-color: rgba(255, 255, 255, 0.02); color: var(--text-main); }
.today { background-color: var(--accent-blue) !important; color: #fff !important; font-weight: 700; }

/* CAMERA GRID ENHANCEMENTS */
.camera-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
  gap: 25px;
  margin-top: 30px;
}

.cam-card { padding: 20px; } /* Slightly less padding for cameras */

.cam-card img {
  width: 100%;
  border-radius: 8px;
  background-color: #000;
  height: 220px;
  object-fit: cover;
  margin-top: 20px;
  border: 2px solid rgba(148, 163, 184, 0.1);
}

/* BADGES */
.badge {
  font-size: 10px;
  border-radius: 4px;
  padding: 6px 14px;
  margin-top: 15px;
  font-weight: 700;
  display: inline-block;
  text-align: center;
  width: fit-content;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.b-ok { background-color: rgba(16, 185, 129, 0.1); color: var(--accent-green); }
.b-warn { background-color: rgba(239, 68, 68, 0.1); color: var(--accent-red); }
.b-ai { background-color: rgba(139, 92, 246, 0.1); color: var(--accent-purple); border: 1px solid rgba(139, 92, 246, 0.3); }

/* SPECIAL AI CARD STYLING */
.ai-card {
  border-color: rgba(139, 92, 246, 0.4);
  background: linear-gradient(145deg, rgba(30, 41, 59, 0.9), rgba(46, 15, 66, 0.3)); /* Subtle purple gradient */
}

/* Custom Scrollbar for Logs */
.log-box::-webkit-scrollbar { width: 6px; }
.log-box::-webkit-scrollbar-track { background: rgba(0, 0, 0, 0.1); }
.log-box::-webkit-scrollbar-thumb { background: rgba(148, 163, 184, 0.3); border-radius: 3px; }
</style>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&family=JetBrains+Mono&display=swap" rel="stylesheet">
</head>
<body>

<div class="header">
  <h1>BSF MONITORING <span style="color: var(--accent-blue)">SYSTEM</span></h1>
  <div id="status" style="color: var(--text-muted)">CONNECTING...</div>
</div>

<div class="container">
  <div class="grid">
    <div class="card">
      <div>
        <div class="title">Temperature</div>
        <div id="temp" class="value">--</div>
      </div>
      <div id="tempBadge" class="badge">OFFLINE</div>
    </div>
    
    <div class="card">
      <div>
        <div class="title">Humidity</div>
        <div id="humidity" class="value">--</div>
      </div>
      <div id="humBadge" class="badge">OFFLINE</div>
    </div>
    
    <div class="card">
      <div>
        <div class="title">Light Level</div>
        <div id="light" class="value">--</div>
      </div>
      <div id="lightBadge" class="badge">OFFLINE</div>
    </div>

    <div class="card ai-card">
      <div>
        <div class="title" style="color: var(--accent-purple);">AI Yield Prediction</div>
        <div id="predictedYield" class="value" style="color: var(--accent-purple);">--</div>
      </div>
      <div id="yieldBadge" class="badge b-ai">REGRESSION MODEL</div>
    </div>
    
    <div class="card">
      <div>
        <div class="title">System State</div>
        <div id="mode" class="value" style="color: var(--accent-blue); font-size: 28px; margin-top: 25px;">--</div>
      </div>
      <div></div>
    </div>
  </div>

  <div class="row">
    <button id="heaterBtn" class="btn" onclick="sendCtrl('heater', '🔥 Heater')">🔥 Heater OFF</button>
    <button id="fanBtn" class="btn" onclick="sendCtrl('fan', '🌀 Fan')">🌀 Fan OFF</button>
    <button id="lightBtn" class="btn" onclick="sendCtrl('light', '💡 Light')">💡 Light OFF</button>
    <button id="humidifierBtn" class="btn" onclick="sendCtrl('humidifier', '💧 Humidifier')">💧 Humidifier OFF</button>
    <button id="autoBtn" class="btn" onclick="sendCtrl('auto', '🤖 Auto Mode')">🤖 Auto Mode</button>
  </div>

  <div class="camera-grid">
    <div class="card cam-card"><div class="title">Cage 01</div><img id="c1" src="http://192.168.11.114:81/stream" alt="Camera Offline"></div>
    <div class="card cam-card"><div class="title">Cage 02</div><img id="c2" src="http://192.168.11.115:81/stream" alt="Camera Offline"></div>
    <div class="card cam-card"><div class="title">Cage 03</div><img id="c3" src="http://192.168.11.116:81/stream" alt="Camera Offline"></div>
  </div>

  <div class="chart-container">
    <div class="title" style="color: #fff; margin-bottom: 20px;">Environment Trends</div>
    <div style="height: 320px;"><canvas id="bsfChart"></canvas></div>
  </div>

  <div class="grid" style="margin-top: 30px; grid-template-columns: 1fr 1.6fr;">
    <div class="calendar-card">
        <div class="cal-header">
            <button onclick="changeMonth(-1)">◀</button>
            <div id="calMonth" style="font-weight: 700; font-size: 15px; color: #fff;"></div>
            <button onclick="changeMonth(1)">▶</button>
        </div>
        <div class="cal-grid" id="calDays"></div>
    </div>
    <div class="card">
        <div>
            <div class="title">📋 System Activity Logs</div>
            <div id="log" class="log-box" style="margin-top: 20px;"></div>
        </div>
    </div>
  </div>
</div>

<script>
// (WALANG BINAGO SA SCRIPT LOGIC MO, KINOPYA LANG)
const firebaseConfig = { databaseURL: "https://bsf-dashboard-506ac-default-rtdb.firebaseio.com/" };
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let watchdogTimer;

// CHART SETUP
const ctx = document.getElementById('bsfChart').getContext('2d');
Chart.defaults.color = '#94a3b8'; // Slate colors for chart text
Chart.defaults.font.family = 'Poppins';

const bsfChart = new Chart(ctx, {
    type: 'line',
    data: { labels: [], datasets: [
        { label: 'Temp (°C)', borderColor: '#ef4444', backgroundColor: 'rgba(239, 68, 68, 0.1)', data: [], tension: 0.4, fill: true, borderWidth: 2, pointRadius: 1 },
        { label: 'Hum (%)', borderColor: '#10b981', backgroundColor: 'rgba(16, 185, 129, 0.1)', data: [], tension: 0.4, fill: true, borderWidth: 2, pointRadius: 1 }
    ]},
    options: { 
        responsive: true, 
        maintainAspectRatio: false,
        plugins: { legend: { position: 'top', labels: { boxWidth: 12, usePointStyle: true } } },
        scales: { 
            x: { grid: { color: 'rgba(148, 163, 184, 0.05)' } },
            y: { grid: { color: 'rgba(148, 163, 184, 0.05)' } }
        }
    }
});

// WATCHDOG
function startWatchdog() {
    if(watchdogTimer) clearTimeout(watchdogTimer);
    watchdogTimer = setTimeout(() => {
        document.getElementById('status').innerText = "OFFLINE";
        document.getElementById('status').style.color = "var(--accent-red)";
        document.getElementById('temp').innerText = "--";
        document.getElementById('humidity').innerText = "--";
        document.getElementById('light').innerText = "--";
        document.getElementById('predictedYield').innerText = "--";
        ["tempBadge", "humBadge", "lightBadge"].forEach(id => {
            document.getElementById(id).innerText = "OFFLINE";
            document.getElementById(id).className = "badge b-warn";
        });
        document.getElementById('yieldBadge').innerText = "OFFLINE";
        document.getElementById('yieldBadge').className = "badge b-warn";
        addLog("CRITICAL: Connection lost.", "ERROR");
    }, 15000); 
}

// FIREBASE LISTENER
db.ref("sensorData").on("value", (snap) => {
    const d = snap.val();
    if(!d) return;

    startWatchdog();
    document.getElementById('status').innerText = "ONLINE";
    document.getElementById('status').style.color = "var(--accent-green)";
    
    document.getElementById('temp').innerText = (d.temperature || 0).toFixed(1) + "°C";
    document.getElementById('humidity').innerText = (d.humidity || 0).toFixed(1) + "%";
    document.getElementById('light').innerText = (d.light || 0).toFixed(0) + " lx";
    document.getElementById('mode').innerText = d.autoMode === 1 ? "AUTO" : "MANUAL";

    // REAL-TIME AI UPDATE: Binabasa ang calculated yield mula sa iyong RPi/Firebase data
    if (d.predictedYield !== undefined && d.predictedYield !== null) {
        document.getElementById('predictedYield').innerText = d.predictedYield.toFixed(2) + " g";
        document.getElementById('yieldBadge').innerText = "MODEL ACTIVE";
        document.getElementById('yieldBadge').className = "badge b-ai";
    } else {
        document.getElementById('predictedYield').innerText = "0.00 g";
        document.getElementById('yieldBadge').innerText = "CALCULATING";
    }

    updateBadge('tempBadge', d.temperature, 25, 35);
    updateBadge('humBadge', d.humidity, 60, 85);
    updateBadge('lightBadge', d.light, 1, 100000); 

    syncUI('heaterBtn', d.heaterStatus, '🔥 Heater');
    syncUI('fanBtn', d.fanStatus, '🌀 Fan');
    syncUI('lightBtn', d.lightStatus, '💡 Light');
    syncUI('humidifierBtn', d.humStatus, '💧 Humidifier');
    syncUI('autoBtn', d.autoMode, '🤖 Auto');

    const time = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
    if(bsfChart.data.labels.length > 10) { bsfChart.data.labels.shift(); bsfChart.data.datasets.forEach(s => s.data.shift()); }
    bsfChart.data.labels.push(time);
    bsfChart.data.datasets[0].data.push(d.temperature);
    bsfChart.data.datasets[1].data.push(d.humidity);
    bsfChart.update();
});

function updateBadge(id, val, min, max) {
    const el = document.getElementById(id);
    if(val >= min && val <= max) { el.className = "badge b-ok"; el.innerText = "OPTIMAL"; }
    else { el.className = "badge b-warn"; el.innerText = "CHECK"; }
}

function syncUI(id, state, label) {
    const el = document.getElementById(id);
    if(state === 1) { 
        el.classList.add(id==='autoBtn'?'active-auto':'active-on'); 
        el.innerText = label + " ON"; 
    } else { 
        el.classList.remove('active-on', 'active-auto'); 
        el.innerText = label + " OFF"; 
    }
}

function sendCtrl(dev, label) {
    const btn = document.getElementById(dev + 'Btn');
    const newState = (btn.classList.contains('active-on') || btn.classList.contains('active-auto')) ? 0 : 1;
    syncUI(dev + 'Btn', newState, label);
    db.ref("commands/" + dev).set(newState.toString());
    addLog(`CMD: ${dev.toUpperCase()} -> ${newState ? 'ON' : 'OFF'}`, "COMMAND");
}

function addLog(m, type) {
    const l = document.getElementById('log');
    if(!l) return;
    const color = type === "COMMAND" ? "var(--accent-blue)" : (type === "ERROR" ? "var(--accent-red)" : "var(--accent-green)");
    l.innerHTML += `<div><span style="color: #555">[${new Date().toLocaleTimeString()}]</span> <span style="color: ${color}">${m}</span></div>`;
    l.scrollTop = l.scrollHeight;
}

// CALENDAR
let curDate = new Date();
function drawCal() {
    const days = document.getElementById('calDays'); if(!days) return; days.innerHTML = '';
    const mLabel = document.getElementById('calMonth');
    mLabel.innerText = curDate.toLocaleString('default', { month: 'long', year: 'numeric' }).toUpperCase();
    ['S','M','T','W','T','F','S'].forEach(d => days.innerHTML += `<div class="day-name">${d}</div>`);
    const fDay = new Date(curDate.getFullYear(), curDate.getMonth(), 1).getDay();
    const tDays = new Date(curDate.getFullYear(), curDate.getMonth() + 1, 0).getDate();
    for(let i=0; i<fDay; i++) days.innerHTML += '<div></div>';
    for(let d=1; d<=tDays; d++) {
        let isToday = d === new Date().getDate() && curDate.getMonth() === new Date().getMonth() && curDate.getFullYear() === new Date().getFullYear() ? 'today' : '';
        days.innerHTML += `<div class="day ${isToday}">${d}</div>`;
    }
}
function changeMonth(v) { curDate.setMonth(curDate.getMonth() + v); drawCal(); }

drawCal();
addLog("System Initialized. Awaiting ESP32 signal...", "SUCCESS");
</script>
</body>
</html>
