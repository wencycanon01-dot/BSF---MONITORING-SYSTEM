<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BSF Smart Monitoring - Wency Canon</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<style>
:root{
  --bg: #010409; --card: rgba(13, 20, 38, 0.7); --muted: #8b949e;
  --green: #00ff88; --red: #ff3366; --blue: #00d2ff; --border: rgba(255, 255, 255, 0.1);
}
*{box-sizing:border-box;}
body{ margin:0; font-family: 'Inter', sans-serif; background-color: var(--bg); color: #e6edf3; min-height: 100vh; overflow-x: hidden;}
.header{ display: flex; justify-content: space-between; align-items: center; padding: 18px 30px; background: rgba(1, 4, 9, 0.9); backdrop-filter: blur(15px); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
#status{ font-size: 10px; padding: 6px 15px; border-radius: 20px; font-weight: 800; border: 1px solid currentColor; transition: all 0.3s; }
.container{ padding: 25px; max-width: 1300px; margin: 0 auto; }
.grid{ display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 20px; }
.card{ background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 25px; }
.title{ font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 2px; font-weight: 700; }
.value{ font-size: 40px; font-weight: 800; color: #fff; margin-top: 10px; }
.row{ display: flex; gap: 15px; flex-wrap: wrap; margin-top: 25px; }
.btn{ flex: 1; min-width: 150px; border: 1px solid var(--border); border-radius: 15px; padding: 18px; font-weight: 700; cursor: pointer; transition: all 0.2s ease; color: rgba(255,255,255,0.4); text-transform: uppercase; font-size: 11px; background: rgba(255, 255, 255, 0.02); }
.btn:active { transform: scale(0.95); }
.btn.active-on{ background: rgba(0, 255, 136, 0.1); border-color: var(--green); color: var(--green); }
.btn.active-auto{ background: rgba(0, 210, 255, 0.1); border-color: var(--blue); color: var(--blue); }
.chart-container{ background: var(--card); border-radius: 24px; padding: 30px; margin-top: 25px; border: 1px solid var(--border); }
.log-box{ background: rgba(0,0,0,0.5); border-radius: 15px; height: 220px; overflow-y: auto; padding: 20px; font-size: 11px; border: 1px solid var(--border); font-family: monospace; line-height: 1.6; }
.calendar-card{ background: var(--card); border-radius: 20px; padding: 25px; border: 1px solid var(--border); }
.cal-header{ display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
.cal-grid{ display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; text-align: center; }
.day-name{ font-size: 10px; font-weight: 800; color: var(--muted); text-transform: uppercase; }
.day{ padding: 10px; font-size: 13px; border-radius: 8px; background: rgba(255,255,255,0.02); }
.today{ background: var(--blue) !important; color: #000 !important; font-weight: 800; }
.camera-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-top: 25px; }
.cam-card img{ width: 100%; border-radius: 15px; background: #000; height: 200px; object-fit: cover; margin-top: 15px; border: 1px solid var(--border); }
.badge{ font-size: 9px; border-radius: 5px; padding: 5px 10px; margin-top: 12px; font-weight: 900; display: inline-block; border: 1px solid transparent; }
</style>
</head>
<body>

<div class="header">
  <h1>🐛 BSF MONITORING <span style="color: var(--blue)">SYSTEM</span></h1>
  <div id="status" style="color: var(--muted)">CONNECTING...</div>
</div>

<div class="container">
  <div class="grid">
    <div class="card"><div class="title">Temperature</div><div id="temp" class="value">--</div><div id="tempBadge" class="badge">OFFLINE</div></div>
    <div class="card"><div class="title">Humidity</div><div id="humidity" class="value">--</div><div id="humBadge" class="badge">OFFLINE</div></div>
    <div class="card"><div class="title">Light Level</div><div id="light" class="value">--</div><div id="lightBadge" class="badge">OFFLINE</div></div>
    <div class="card"><div class="title">System State</div><div id="mode" class="value" style="color: var(--blue); font-size: 25px;">--</div></div>
  </div>

  <div class="row">
    <button id="heaterBtn" class="btn" onclick="sendCtrl('heater', '🔥 Heater')">🔥 Heater OFF</button>
    <button id="fanBtn" class="btn" onclick="sendCtrl('fan', '🌀 Fan')">🌀 Fan OFF</button>
    <button id="lightBtn" class="btn" onclick="sendCtrl('light', '💡 Light')">💡 Light OFF</button>
    <button id="humidifierBtn" class="btn" onclick="sendCtrl('humidifier', '💧 Humidifier')">💧 Humidifier OFF</button>
    <button id="autoBtn" class="btn" onclick="sendCtrl('auto', '🤖 Auto Mode')">🤖 Auto Mode</button>
  </div>

  <div class="camera-grid">
    <div class="card cam-card"><div class="title">Cage 01</div><img id="c1" src="http://192.168.1.114:81/stream" alt="Camera Offline"></div>
    <div class="card cam-card"><div class="title">Cage 02</div><img id="c2" src="http://192.168.1.115:81/stream" alt="Camera Offline"></div>
    <div class="card cam-card"><div class="title">Cage 03</div><img id="c3" src="http://192.168.1.116:81/stream" alt="Camera Offline"></div>
  </div>

  <div class="chart-container">
    <div class="title" style="color: #fff; margin-bottom: 15px;">Environment Trends</div>
    <div style="height: 300px;"><canvas id="bsfChart"></canvas></div>
  </div>

  <div class="grid" style="margin-top: 25px; grid-template-columns: 1fr 1.5fr;">
    <div class="calendar-card">
        <div class="cal-header">
            <button onclick="changeMonth(-1)" style="background:none; border:none; color:#fff; cursor:pointer;">◀</button>
            <div id="calMonth" style="font-weight: 800; font-size: 14px;"></div>
            <button onclick="changeMonth(1)" style="background:none; border:none; color:#fff; cursor:pointer;">▶</button>
        </div>
        <div class="cal-grid" id="calDays"></div>
    </div>
    <div class="card"><div class="title">📋 System Activity Logs</div><div id="log" class="log-box"></div></div>
  </div>
</div>

<script>
const firebaseConfig = { databaseURL: "https://bsf-dashboard-506ac-default-rtdb.firebaseio.com/" };
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let watchdogTimer;
let isSwitching = false;

// 1. CHART LOGIC
const ctx = document.getElementById('bsfChart').getContext('2d');
const bsfChart = new Chart(ctx, {
    type: 'line',
    data: { labels: [], datasets: [
        { label: 'Temp', borderColor: '#ff3366', backgroundColor: 'rgba(255, 51, 102, 0.1)', data: [], tension: 0.4, fill: true },
        { label: 'Hum', borderColor: '#00ff88', backgroundColor: 'rgba(0, 255, 136, 0.1)', data: [], tension: 0.4, fill: true }
    ]},
    options: { responsive: true, maintainAspectRatio: false }
});

// 2. UPDATED BADGE LOGIC (LOW, OPTIMAL, CRITICAL)
function updateBadge(id, val, min, max) {
    const el = document.getElementById(id);
    if (val < min) {
        el.style.backgroundColor = "rgba(255, 165, 0, 0.1)"; el.style.border = "1px solid orange"; el.style.color = "orange";
        el.innerText = "LOW";
    } else if (val > max) {
        el.style.backgroundColor = "rgba(255, 51, 102, 0.1)"; el.style.border = "1px solid var(--red)"; el.style.color = "var(--red)";
        el.innerText = "CRITICAL";
    } else {
        el.style.backgroundColor = "rgba(0, 255, 136, 0.1)"; el.style.border = "1px solid var(--green)"; el.style.color = "var(--green)";
        el.innerText = "OPTIMAL";
    }
}

// 3. WATCHDOG (AUTO-RESET ON OFFLINE)
function startWatchdog() {
    if(watchdogTimer) clearTimeout(watchdogTimer);
    watchdogTimer = setTimeout(() => {
        document.getElementById('status').innerText = "OFFLINE";
        document.getElementById('status').style.color = "var(--red)";
        document.getElementById('temp').innerText = "--";
        document.getElementById('humidity').innerText = "--";
        document.getElementById('light').innerText = "--";
        document.getElementById('mode').innerText = "--";
        ["tempBadge", "humBadge", "lightBadge"].forEach(id => {
            const el = document.getElementById(id);
            el.innerText = "OFFLINE"; el.style.color = "var(--red)"; el.style.border = "1px solid var(--red)"; el.style.backgroundColor = "rgba(255, 51, 102, 0.1)";
        });
    }, 15000); 
}

// 4. FIREBASE LISTENER
db.ref("sensorData").on("value", (snap) => {
    if (isSwitching) return; 
    const d = snap.val();
    if(!d) return;

    startWatchdog();
    document.getElementById('status').innerText = "ONLINE";
    document.getElementById('status').style.color = "var(--green)";
    document.getElementById('temp').innerText = (d.temperature || 0).toFixed(1) + "°C";
    document.getElementById('humidity').innerText = (d.humidity || 0).toFixed(1) + "%";
    document.getElementById('light').innerText = (d.light > 10 ? d.light.toFixed(0) : "0") + " lx";
    document.getElementById('mode').innerText = d.autoMode === 1 ? "AUTO" : "MANUAL";

    updateBadge('tempBadge', d.temperature, 25, 35);
    updateBadge('humBadge', d.humidity, 60, 85);
    updateBadge('lightBadge', d.light, 500, 5000);

    syncUI('heaterBtn', d.heaterStatus, '🔥 Heater');
    syncUI('fanBtn', d.fanStatus, '🌀 Fan');
    syncUI('lightBtn', d.lightStatus, '💡 Light');
    syncUI('humidifierBtn', d.humStatus, '💧 Humidifier');
    syncUI('autoBtn', d.autoMode, '🤖 Auto');

    const time = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
    if(bsfChart.data.labels.length > 10) { bsfChart.data.labels.shift(); bsfChart.data.datasets.forEach(s => s.data.shift()); }
    bsfChart.data.labels.push(time); bsfChart.data.datasets[0].data.push(d.temperature); bsfChart.data.datasets[1].data.push(d.humidity); bsfChart.update();
});

function syncUI(id, state, label) {
    const el = document.getElementById(id);
    if(state === 1) { el.classList.add(id==='autoBtn'?'active-auto':'active-on'); el.innerText = label + " ON"; } 
    else { el.classList.remove('active-on', 'active-auto'); el.innerText = label + " OFF"; }
}

// 5. CONTROL LOGIC (ANTI-FLICKER)
function sendCtrl(dev, label) {
    if (isSwitching) return; 
    isSwitching = true;
    const btn = document.getElementById(dev + 'Btn');
    const newState = (btn.classList.contains('active-on') || btn.classList.contains('active-auto')) ? 0 : 1;
    syncUI(dev + 'Btn', newState, label);
    if (dev === 'auto') document.getElementById('mode').innerText = newState === 1 ? "AUTO" : "MANUAL";
    db.ref("commands/" + dev).set(newState.toString());
    addLog(`CMD: ${dev.toUpperCase()} -> ${newState ? 'ON' : 'OFF'}`, "COMMAND");
    setTimeout(() => { isSwitching = false; }, 2500); 
}

function addLog(m, type) {
    const l = document.getElementById('log');
    const color = type === "COMMAND" ? "var(--blue)" : (type === "ERROR" ? "var(--red)" : "var(--green)");
    l.innerHTML += `<div><span style="color: #555">[${new Date().toLocaleTimeString()}]</span> <span style="color: ${color}">${m}</span></div>`;
    l.scrollTop = l.scrollHeight;
}

// 6. CALENDAR LOGIC
let curDate = new Date();
function drawCal() {
    const days = document.getElementById('calDays'); days.innerHTML = '';
    const mLabel = document.getElementById('calMonth');
    mLabel.innerText = curDate.toLocaleString('default', { month: 'long', year: 'numeric' }).toUpperCase();
    ['S','M','T','W','T','F','S'].forEach(d => days.innerHTML += `<div class="day-name">${d}</div>`);
    const fDay = new Date(curDate.getFullYear(), curDate.getMonth(), 1).getDay();
    const tDays = new Date(curDate.getFullYear(), curDate.getMonth() + 1, 0).getDate();
    for(let i=0; i<fDay; i++) days.innerHTML += '<div></div>';
    for(let d=1; d<=tDays; d++) {
        let isToday = (d === new Date().getDate() && curDate.getMonth() === new Date().getMonth() && curDate.getFullYear() === new Date().getFullYear()) ? 'today' : '';
        days.innerHTML += `<div class="day ${isToday}">${d}</div>`;
    }
}
function changeMonth(v) { curDate.setMonth(curDate.getMonth() + v); drawCal(); }

drawCal();
addLog("Dashboard Ready. Waiting for Hardware...", "SUCCESS");
</script>
</body>
</html>
